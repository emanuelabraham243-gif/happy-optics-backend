<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Optics — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #03100f;
    --bg2:      #071917;
    --bg3:      #0c2421;
    --teal:     #00c4ba;
    --teal-dk:  #004b49;
    --gold:     #c9a84c;
    --white:    #ffffff;
    --muted:    rgba(255,255,255,.5);
    --border:   rgba(255,255,255,.08);
    --glass:    rgba(255,255,255,.045);
    --red:      #ef4444;
    --green:    #22c55e;
    --yellow:   #f59e0b;
    --blue:     #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #03100f 0%, #004b49 50%, #03100f 100%);
  }
  .login-card {
    background: rgba(255,255,255,.06); backdrop-filter: blur(24px);
    border: 1px solid rgba(0,196,186,.2); border-radius: 24px;
    padding: 3rem 2.5rem; width: 100%; max-width: 420px;
    box-shadow: 0 24px 80px rgba(0,0,0,.4);
  }
  .login-logo { text-align: center; margin-bottom: 2rem; }
  .login-logo .name { font-size: 1.5rem; font-weight: 700; color: var(--white); }
  .login-logo .sub  { font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: var(--teal); }
  .login-title { font-size: 1.2rem; font-weight: 700; margin-bottom: .4rem; }
  .login-sub { font-size: .82rem; color: var(--muted); margin-bottom: 2rem; }
  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; font-size: .72rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }
  .form-group input {
    width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border);
    border-radius: 10px; padding: .85rem 1rem; font-family: 'Poppins', sans-serif;
    font-size: .85rem; color: var(--white); outline: none; transition: border-color .2s;
  }
  .form-group input:focus { border-color: rgba(0,196,186,.5); }
  .login-btn {
    width: 100%; background: linear-gradient(135deg, var(--teal), var(--teal-dk));
    color: var(--bg); border: none; padding: 1rem; border-radius: 12px;
    font-family: 'Poppins', sans-serif; font-size: .88rem; font-weight: 700;
    cursor: pointer; margin-top: .5rem; transition: all .3s;
  }
  .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,196,186,.35); }
  .login-error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 8px; padding: .8rem 1rem; font-size: .8rem; color: #ef4444; margin-bottom: 1rem; display: none; }

  /* ── DASHBOARD LAYOUT ── */
  #dashboard { display: none; }
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 240px;
    background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 100;
  }
  .sidebar-logo { padding: 1.5rem; border-bottom: 1px solid var(--border); }
  .sidebar-logo .name { font-size: 1rem; font-weight: 700; }
  .sidebar-logo .sub  { font-size: .6rem; letter-spacing: .15em; text-transform: uppercase; color: var(--teal); }
  .nav-section { padding: 1.2rem 1rem; flex: 1; }
  .nav-label { font-size: .6rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); padding: 0 .5rem; margin-bottom: .5rem; }
  .nav-item {
    display: flex; align-items: center; gap: .75rem; padding: .7rem .75rem;
    border-radius: 10px; font-size: .82rem; font-weight: 500; color: var(--muted);
    cursor: pointer; transition: all .2s; margin-bottom: 2px; text-decoration: none;
  }
  .nav-item:hover, .nav-item.active { background: rgba(0,196,186,.1); color: var(--white); }
  .nav-item.active { color: var(--teal); }
  .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }
  .sidebar-footer { padding: 1rem; border-top: 1px solid var(--border); }
  .logout-btn {
    width: 100%; padding: .65rem; border-radius: 10px; background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.2); color: #ef4444; font-size: .78rem;
    font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; transition: all .2s;
  }
  .logout-btn:hover { background: rgba(239,68,68,.2); }

  .main-content { margin-left: 240px; padding: 2rem; min-height: 100vh; }
